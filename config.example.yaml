slug: prism
name: Prism
version: 0.1.0
database_url: sqlite+aiosqlite:////data/prism.sqlite3
shared_token_file: /run/secrets/prism_internal_token
epoch_seconds: 21600
fineweb_sample_count: 128
sequence_length: 128
max_parameters: 150000000
execution_backend: remote_provider
lium_backend: sdk
lium_base_url: null
lium_token_file: /run/secrets/lium_token
lium_gpu_count: 1
lium_gpu_type: null
lium_ssh_key_path: null
lium_keep_pod: false
lium_pod_timeout_seconds: 600
lium_eval_timeout_seconds: 900
allow_fake_lium: false
worker_claim_timeout_seconds: 900
llm_review_enabled: true
llm_review_required: true
chutes_base_url: https://llm.chutes.ai/v1
chutes_model: null
chutes_api_key_file: /run/secrets/chutes_api_key
llm_review_timeout_seconds: 60
subnet_rules_file: /run/config/subnet_rules.json
plagiarism_enabled: true
plagiarism_min_similarity: 0.65
plagiarism_static_reject_threshold: 0.96
plagiarism_top_k: 2
plagiarism_sandbox_enabled: true
plagiarism_sandbox_image: python:3.12-alpine
plagiarism_sandbox_timeout_seconds: 30
plagiarism_storage_max_files: 200
plagiarism_storage_max_bytes: 2000000
docker_backend: broker
docker_broker_url: http://platform-docker-broker:8082
docker_broker_token_file: /run/secrets/platform/challenge_token
docker_network: none
docker_cpus: 1
docker_memory: 512m
docker_pids_limit: 128
